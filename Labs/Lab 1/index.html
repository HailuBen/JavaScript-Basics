<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <title>JS Basics - Lab 1</title>
</head>

<body style="background-color: #191919; color: aliceblue;">

    <h1>JavaScript Basics</h1>
    <h2>Lab 1</h2>

    <p>(Check the console)</p>
    
    <br>

    <details open>
        <summary><b>Show/Hide JavaScript Code</b></summary>

        <pre id="code"></pre>
    </details>

    <script>
        fetch("script.js")
            .then(r => r.text())
            .then(t => document.getElementById("code").textContent = t);
    </script>

</body>

</html>
