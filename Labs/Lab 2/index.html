<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <title>Lab 2 - 113</title>
</head>

<body class="dark">

    <button onclick="toggleDarkMode()" id="themeBtn">Let there be Light</button>

    <h2>Fundamentals of JavaScript - CPAN-113-RNA</h2>
    <h3>Beniam Hailu</h3>

    <!-- display console logs to DOM -->
    <br>
    <h3>Console Logs: </h3>
    <div id="log"></div>   


    <style>
        body.dark {
            background: #121212;
            color: white;
        }

        button {
            padding: 10px;
            margin: 10px;
        }
    </style>
    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark");

            const btn = document.getElementById("themeBtn");

            if (document.body.classList.contains("dark")) {
                btn.textContent = "Light";
            } else {
                btn.textContent = "Dark";
            }
        }
    </script>

</body>

</html>
